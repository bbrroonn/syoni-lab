<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>SHONI LAB — Virtual Nail Try-On</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══ TOKENS ═══ */
:root {
  --gold:    #c8a56a;
  --gold-lt: #e8d5b0;
  --gold-dk: #8a6d42;
  --ink:     #0e0c0a;
  --ink2:    #1e1b16;
  --ink3:    #2e2a22;
  --smoke:   #f5f2ed;
  --smoke2:  #ede8e0;
  --dust:    #b0a898;
  --white:   #ffffff;
  --red:     #c0392b;
  --green:   #27ae60;
  --ff-serif: 'Cormorant Garamond', Georgia, serif;
  --ff-sans:  'DM Sans', system-ui, sans-serif;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--ink);
  color: var(--smoke);
  font-family: var(--ff-sans);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  touch-action: manipulation;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; }
img { display: block; max-width: 100%; }

/* ═══ SCREENS ═══ */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
  overflow: hidden;
}
.screen.active { opacity: 1; pointer-events: auto; }

/* ═══ MODE SELECT ═══ */
#screenMode {
  background: var(--ink);
  align-items: center; justify-content: center;
  gap: 0;
  padding: calc(var(--safe-top) + 48px) 32px calc(var(--safe-bottom) + 48px);
}
.logo-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 52px; }
.logo-diamond {
  width: 44px; height: 44px;
  border: 1.5px solid var(--gold);
  transform: rotate(45deg);
  margin-bottom: 22px; position: relative;
}
.logo-diamond::after {
  content: ''; position: absolute; inset: 6px;
  border: 1px solid var(--gold-dk);
}
.logo-name {
  font-family: var(--ff-serif);
  font-size: 2.2rem; font-weight: 300;
  letter-spacing: .18em; color: var(--gold-lt);
  text-transform: uppercase;
}
.logo-sub { font-size: .70rem; letter-spacing: .28em; color: var(--dust); text-transform: uppercase; margin-top: 6px; }

.mode-cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
.mode-card {
  width: 100%; padding: 20px 22px;
  background: var(--ink2); border: 1px solid var(--ink3);
  border-radius: 12px; text-align: left;
  transition: border-color .2s, background .2s;
  position: relative; overflow: hidden;
}
.mode-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; background: var(--gold);
  opacity: 0; transition: opacity .2s;
}
.mode-card:active { background: var(--ink3); }
.mode-card:active::before { opacity: 1; }
.mode-icon { font-size: 1.5rem; margin-bottom: 8px; }
.mode-title { font-family: var(--ff-serif); font-size: 1.25rem; font-weight: 400; color: var(--gold-lt); margin-bottom: 3px; }
.mode-desc { font-size: .76rem; color: var(--dust); line-height: 1.5; }
.admin-trigger {
  position: fixed; top: calc(var(--safe-top) + 14px); right: 18px;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink3); font-size: 1rem; z-index: 100;
}

/* ═══ DESIGN SELECT ═══ */
#screenDesign { background: var(--smoke); color: var(--ink); }
.topbar {
  display: flex; align-items: center;
  padding: calc(var(--safe-top) + 12px) 14px 12px;
  background: var(--white); border-bottom: 1px solid var(--smoke2);
  gap: 10px; flex-shrink: 0;
}
.topbar-back {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; color: var(--ink); border-radius: 8px; flex-shrink: 0;
}
.topbar-title { font-family: var(--ff-serif); font-size: 1.25rem; font-weight: 400; flex: 1; }
.topbar-action { font-size: .76rem; color: var(--gold-dk); letter-spacing: .03em; padding: 8px 4px; }

.cat-bar {
  display: flex; gap: 7px; padding: 10px 14px;
  overflow-x: auto; background: var(--white);
  border-bottom: 1px solid var(--smoke2); flex-shrink: 0;
  scrollbar-width: none;
}
.cat-bar::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0; padding: 6px 13px;
  border-radius: 20px; font-size: .76rem; letter-spacing: .03em;
  color: var(--dust); background: var(--smoke);
  transition: all .2s; border: 1px solid transparent;
}
.cat-btn.active { background: var(--ink); color: var(--gold-lt); border-color: var(--ink); }

.slot-bar { background: var(--white); padding: 9px 14px; border-bottom: 1px solid var(--smoke2); flex-shrink: 0; }
.slot-bar.hidden { display: none; }
.slot-row { display: flex; gap: 5px; margin-bottom: 5px; overflow-x: auto; scrollbar-width: none; }
.slot-row::-webkit-scrollbar { display: none; }
.slot-btn {
  flex-shrink: 0; width: 42px; height: 34px;
  border-radius: 6px; font-size: .68rem; font-weight: 500;
  color: var(--dust); background: var(--smoke);
  border: 1.5px solid transparent; transition: all .15s; position: relative;
}
.slot-btn.active { background: var(--ink2); color: var(--gold-lt); border-color: var(--gold-dk); }
.slot-btn.filled::after {
  content: ''; position: absolute; top: 3px; right: 3px;
  width: 5px; height: 5px; border-radius: 50%; background: var(--gold);
}
.slot-label { font-size: .70rem; color: var(--dust); letter-spacing: .02em; }

.selected-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; background: var(--ink); color: var(--smoke); flex-shrink: 0;
}
.selected-bar.hidden { display: none; }
.sb-thumb { width: 38px; height: 38px; border-radius: 6px; object-fit: cover; border: 1px solid var(--ink3); }
.sb-info { flex: 1; min-width: 0; }
.sb-name { font-size: .82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-meta { font-size: .70rem; color: var(--dust); }
.sb-next { padding: 9px 16px; background: var(--gold); color: var(--ink); border-radius: 8px; font-size: .80rem; font-weight: 500; flex-shrink: 0; }

.design-scroll { flex: 1; overflow-y: auto; padding: 10px; background: var(--smoke); }
.design-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.d-card {
  aspect-ratio: 3/4; border-radius: 8px; overflow: hidden;
  background: var(--smoke2); position: relative;
  cursor: pointer; transition: transform .15s;
}
.d-card:active { transform: scale(.96); }
.d-card img { width: 100%; height: 100%; object-fit: cover; }
.d-card-name {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 18px 5px 5px;
  background: linear-gradient(transparent, rgba(0,0,0,.65));
  font-size: .62rem; color: #fff; line-height: 1.2;
}
.d-card-badge {
  position: absolute; top: 4px; right: 4px;
  padding: 2px 5px; background: rgba(0,0,0,.55);
  border-radius: 3px; font-size: .56rem; color: rgba(255,255,255,.85);
}
.d-card.selected::after {
  content: '✓'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(200,165,106,.35); font-size: 1.6rem; color: #fff;
  border: 2px solid var(--gold); border-radius: 8px;
}
.d-empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--dust); font-size: .82rem; }
.d-loading { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--dust); }

/* ═══ CAMERA ═══ */
#screenCamera { background: #000; }
.cam-wrap { position: relative; width: 100%; flex: 1; overflow: hidden; background: #000; }
#videoEl { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
#arCanvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
#guideCanvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

/* 탭 감지 레이어 */
#tapLayer {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: none; /* 탭 모드일 때만 표시 */
  z-index: 15;
  cursor: crosshair;
}
#tapLayer.active { display: block; }

.cam-hud {
  position: absolute; top: 0; left: 0; right: 0;
  padding: calc(var(--safe-top) + 10px) 14px 10px;
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(rgba(0,0,0,.55), transparent);
  z-index: 20;
}
.cam-back {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 1.1rem;
  background: rgba(0,0,0,.4); border-radius: 50%;
}
.cam-title { flex: 1; font-family: var(--ff-serif); font-size: 1.15rem; color: #fff; letter-spacing: .05em; }
.cam-status-badge {
  padding: 5px 10px; border-radius: 12px;
  font-size: .66rem; letter-spacing: .03em;
  background: rgba(0,0,0,.5); color: rgba(255,255,255,.7);
  border: 1px solid rgba(255,255,255,.15);
  transition: all .3s;
}
.cam-status-badge.ready { background: rgba(39,174,96,.2); color: #6fd99e; border-color: rgba(39,174,96,.3); }
.cam-status-badge.detecting { background: rgba(200,165,106,.2); color: #e8d5b0; border-color: rgba(200,165,106,.3); }
.cam-status-badge.tap { background: rgba(192,57,43,.2); color: #f1948a; border-color: rgba(192,57,43,.3); }

/* AI 감지 진행 표시 */
.detect-progress {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 18; text-align: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.detect-progress.show { opacity: 1; }
.detect-ring {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid rgba(200,165,106,.3);
  border-top-color: var(--gold);
  animation: spin .8s linear infinite;
  margin: 0 auto 12px;
}
.detect-txt { font-size: .78rem; color: rgba(255,255,255,.8); letter-spacing: .05em; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 탭 모드 안내 */
.tap-guide {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 16; pointer-events: none;
  display: flex; flex-direction: column;
  align-items: center;
}
.tap-instruction {
  margin-top: calc(var(--safe-top) + 70px);
  background: rgba(0,0,0,.65);
  padding: 10px 20px; border-radius: 20px;
  font-size: .80rem; color: #fff; letter-spacing: .04em;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.tap-progress-row {
  position: absolute; bottom: calc(var(--safe-bottom) + 140px);
  display: flex; gap: 10px;
}
.tap-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.4);
  display: flex; align-items: center; justify-content: center;
  font-size: .60rem; color: rgba(255,255,255,.5);
  transition: all .2s;
}
.tap-dot.done { background: var(--gold); border-color: var(--gold); color: var(--ink); font-weight: 600; }
.tap-dot.current { border-color: #fff; color: #fff; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

/* 탭 마커 (터치한 위치 표시) */
.tap-marker {
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: rgba(200,165,106,.25);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 17;
  animation: tapAnim .3s ease;
}
@keyframes tapAnim { from{transform:translate(-50%,-50%) scale(.5);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }

.cam-controls {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 14px 22px calc(var(--safe-bottom) + 22px);
  background: linear-gradient(transparent, rgba(0,0,0,.7));
  z-index: 20;
}
.cam-hint { text-align: center; font-size: .73rem; color: rgba(255,255,255,.6); margin-bottom: 14px; letter-spacing: .03em; }
.cam-btn-row { display: flex; align-items: center; justify-content: space-between; }
.cam-side-btn {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,.15); color: #fff; font-size: 1rem;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.cam-snap {
  width: 68px; height: 68px; border-radius: 50%;
  background: #fff; border: 4px solid rgba(255,255,255,.3);
  display: flex; align-items: center; justify-content: center;
  transition: transform .1s;
  box-shadow: 0 0 0 2px rgba(200,165,106,.5);
}
.cam-snap:active { transform: scale(.9); }
.cam-snap-inner { width: 52px; height: 52px; border-radius: 50%; background: var(--gold-lt); }

/* 자동 촬영 카운트다운 */
.auto-countdown {
  position: absolute; bottom: calc(var(--safe-bottom) + 110px);
  left: 50%; transform: translateX(-50%);
  z-index: 21;
  font-family: var(--ff-serif);
  font-size: 3rem; color: var(--gold);
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.auto-countdown.show { opacity: 1; }

/* 탭 모드에서 촬영 버튼 숨김 */
.cam-snap.hidden { display: none; }

/* 탭 완료 버튼 */
.tap-done-btn {
  position: absolute; bottom: calc(var(--safe-bottom) + 24px);
  left: 50%; transform: translateX(-50%);
  z-index: 21;
  padding: 14px 36px;
  background: var(--gold); color: var(--ink);
  border-radius: 12px; font-size: .95rem; font-weight: 500;
  letter-spacing: .04em;
  display: none;
}
.tap-done-btn.show { display: block; }

/* 탭 리셋 버튼 */
.tap-reset-btn {
  position: absolute; bottom: calc(var(--safe-bottom) + 80px);
  left: 50%; transform: translateX(-50%);
  z-index: 21;
  padding: 10px 24px;
  background: rgba(255,255,255,.15); color: rgba(255,255,255,.8);
  border-radius: 10px; font-size: .80rem;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none;
}
.tap-reset-btn.show { display: block; }

/* Phase indicator */
.phase-indicator { display: flex; gap: 7px; justify-content: center; margin-bottom: 9px; }
.phase-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.25); transition: background .3s; }
.phase-dot.active { background: var(--gold); }
.phase-dot.done { background: rgba(200,165,106,.5); }

/* ═══ RESULT ═══ */
#screenResult { background: var(--smoke); color: var(--ink); }
.result-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.canvas-wrap { position: relative; background: var(--ink2); }
.canvas-wrap canvas { display: block; width: 100%; height: auto; }
.result-toolbar {
  display: flex; align-items: center;
  padding: 10px 14px; background: var(--white);
  border-bottom: 1px solid var(--smoke2); gap: 7px; flex-shrink: 0;
}
.rtb-btn {
  flex: 1; padding: 10px 7px; border-radius: 8px;
  font-size: .74rem; color: var(--ink); background: var(--smoke); text-align: center; transition: background .15s;
}
.rtb-btn:active { background: var(--smoke2); }
.rtb-btn.primary { background: var(--gold); color: var(--ink); font-weight: 500; }

.adjust-panel { padding: 14px; background: var(--white); border-top: 1px solid var(--smoke2); }
.adjust-title { font-size: .70rem; color: var(--dust); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
.adjust-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.adjust-row:last-child { margin-bottom: 0; }
.adjust-lbl { font-size: .70rem; color: var(--ink3); width: 42px; flex-shrink: 0; }
.adjust-val { font-size: .70rem; color: var(--gold-dk); width: 34px; text-align: right; flex-shrink: 0; }
input[type=range] {
  flex: 1; height: 3px; -webkit-appearance: none;
  background: var(--smoke2); border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px;
  border-radius: 50%; background: var(--ink); cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.shape-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }
.shape-btn {
  padding: 5px 11px; border-radius: 6px; font-size: .70rem;
  background: var(--smoke); color: var(--dust); border: 1px solid transparent; transition: all .15s;
}
.shape-btn.active { background: var(--ink); color: var(--gold-lt); border-color: var(--ink); }

.design-info-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--white); border-top: 1px solid var(--smoke2);
}
.dib-thumb { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; }
.dib-body { flex: 1; min-width: 0; }
.dib-name { font-size: .88rem; font-weight: 500; }
.dib-meta { font-size: .70rem; color: var(--dust); margin-top: 2px; }

.preview-tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--smoke2); flex-shrink: 0; }
.ptab { flex: 1; padding: 11px; font-size: .76rem; color: var(--dust); text-align: center; border-bottom: 2px solid transparent; transition: all .15s; }
.ptab.active { color: var(--ink); border-bottom-color: var(--ink); }

/* ═══ MODAL ═══ */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .22s;
}
.modal-backdrop.show { opacity: 1; pointer-events: auto; }
.modal-sheet {
  width: 100%; background: var(--white);
  border-radius: 20px 20px 0 0;
  padding: 7px 0 calc(var(--safe-bottom) + 8px);
  transform: translateY(16px); transition: transform .22s;
  max-height: 88vh; overflow-y: auto;
}
.modal-backdrop.show .modal-sheet { transform: translateY(0); }
.modal-handle { width: 34px; height: 4px; background: var(--smoke2); border-radius: 2px; margin: 0 auto 14px; }
.modal-img { width: calc(100% - 28px); max-height: 240px; object-fit: cover; border-radius: 10px; margin: 0 14px 14px; }
.modal-body { padding: 0 14px 14px; }
.modal-cat { font-size: .66rem; letter-spacing: .1em; color: var(--dust); text-transform: uppercase; margin-bottom: 3px; }
.modal-name { font-family: var(--ff-serif); font-size: 1.5rem; font-weight: 400; color: var(--ink); margin-bottom: 5px; }
.modal-desc { font-size: .80rem; color: var(--dust); line-height: 1.6; }
.modal-price { font-size: 1.05rem; font-weight: 500; color: var(--ink); margin-top: 8px; }
.modal-apply { display: flex; flex-direction: column; gap: 9px; padding: 0 14px; }
.modal-btn-primary {
  width: 100%; padding: 15px;
  background: var(--ink); color: var(--gold-lt);
  border-radius: 12px; font-family: var(--ff-serif);
  font-size: 1.05rem; font-weight: 400; letter-spacing: .05em;
}
.modal-btn-secondary {
  width: 100%; padding: 12px; background: var(--smoke);
  color: var(--ink); border-radius: 12px; font-size: .83rem; border: 1px solid var(--smoke2);
}

/* ═══ ADMIN ═══ */
#screenAdmin { background: var(--smoke); color: var(--ink); overflow-y: auto; }
.admin-content { padding: calc(var(--safe-top) + 58px) 14px calc(var(--safe-bottom) + 28px); max-width: 480px; margin: 0 auto; }
.admin-section { background: var(--white); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
.admin-section-title { padding: 12px 14px; font-size: .70rem; letter-spacing: .1em; color: var(--dust); text-transform: uppercase; border-bottom: 1px solid var(--smoke2); }
.admin-form { padding: 14px; }
.admin-field { margin-bottom: 10px; }
.admin-label { font-size: .70rem; color: var(--dust); display: block; margin-bottom: 4px; letter-spacing: .03em; }
.admin-input {
  width: 100%; padding: 9px 11px;
  background: var(--smoke); border: 1px solid var(--smoke2);
  border-radius: 8px; font-size: .88rem; color: var(--ink); outline: none;
}
.admin-input:focus { border-color: var(--gold); }
.admin-select {
  width: 100%; padding: 9px 11px;
  background: var(--smoke); border: 1px solid var(--smoke2);
  border-radius: 8px; font-size: .88rem; color: var(--ink); outline: none; -webkit-appearance: none;
}
.admin-upload-area {
  width: 100%; aspect-ratio: 3/4; border: 2px dashed var(--smoke2);
  border-radius: 10px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden; transition: border-color .2s;
}
.admin-upload-area:active { border-color: var(--gold); }
.admin-upload-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.admin-upload-placeholder { font-size: .78rem; color: var(--dust); text-align: center; line-height: 1.6; }

<script>
'use strict';

/* ══════════════════════════════════════════════════════
   SHONI LAB v11
   핵심 구조:
   1. AI 자동 감지 시도 (3초, 신뢰도 80% 이상)
   2. 실패 → 탭 캘리브레이션 모드 자동 전환
   3. 탭 위치 기반 정확한 존 생성
   4. 디자인 교체 시 재촬영 없이 즉시 적용
══════════════════════════════════════════════════════ */

const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);

/* ── 전역 상태 ── */
let appMode      = 'uniform';
let capturePhase = 'uniform';
let currentShape = 'round';
let currentCat   = 'all';
let designs      = [];
let uniformDesign = null;
const SLOT_COUNT = 10;
let individualSlots = new Array(SLOT_COUNT).fill(null);
let currentSlot  = 0;

// 카메라
let camStream  = null;
let facingMode = 'environment';
let arLoopId   = null;

// MediaPipe
let mpHandLandmarker = null;
let mpReady  = false;
let mpLoading = false;

// 감지 상태
let detectionMode = 'auto'; // 'auto' | 'tap' | 'done'
let autoDetectTimer = null;
let autoDetectFrames = 0;
let bestZones = null;
let bestConfidence = 0;

// 탭 캘리브레이션
const FINGER_NAMES_KO = ['엄지', '검지', '중지', '약지', '새끼'];
const FINGER_ORDER    = ['thumb', 'index', 'middle', 'ring', 'pinky'];
let tapZones    = []; // 탭으로 생성된 존들
let tapStep     = 0;  // 0~4 (어떤 손가락 순서로 탭하는지)

// 스냅/결과
let cachedSnap   = null;
let cachedSnapL  = null;
let cachedSnapR  = null;
let cachedZonesL = null;
let cachedZonesR = null;
let captureComplete = false;

// 디자인 이미지
let arDesignImgs  = [];
let arDesignImgsR = [];

// 오버레이 설정
let overlayCfg = { scale: 1.0, offsetY: 0, opacity: 0.92 };

/* ── 손가락별 기본 크기 비율 (탭 기반 존 생성용) ── */
const FINGER_SIZE_RATIO = {
  thumb:  { w: 0.058, h: 0.075 },
  index:  { w: 0.052, h: 0.068 },
  middle: { w: 0.054, h: 0.072 },
  ring:   { w: 0.050, h: 0.066 },
  pinky:  { w: 0.042, h: 0.055 },
};

/* ══════════════════════════════════════════════
   DB — IndexedDB
══════════════════════════════════════════════ */
const DB = (() => {
  let db = null;
  const NAME = 'shoni_db', VER = 1, STORE = 'designs';
  async function open() {
    if (db) return db;
    return new Promise((res, rej) => {
      const req = indexedDB.open(NAME, VER);
      req.onupgradeneeded = e => {
        if (!e.target.result.objectStoreNames.contains(STORE))
          e.target.result.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
      };
      req.onsuccess = e => { db = e.target.result; res(db); };
      req.onerror   = () => rej(req.error);
    });
  }
  async function list() {
    const d = await open();
    return new Promise((res, rej) => {
      const req = d.transaction(STORE, 'readonly').objectStore(STORE).getAll();
      req.onsuccess = () => res(req.result || []);
      req.onerror   = () => rej(req.error);
    });
  }
  async function add(item) {
    const d = await open();
    return new Promise((res, rej) => {
      const req = d.transaction(STORE, 'readwrite').objectStore(STORE).add({ ...item, created_at: Date.now() });
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    });
  }
  async function remove(id) {
    const d = await open();
    return new Promise((res, rej) => {
      const req = d.transaction(STORE, 'readwrite').objectStore(STORE).delete(id);
      req.onsuccess = () => res();
      req.onerror   = () => rej(req.error);
    });
  }
  return { list, add, remove };
})();

/* ══════════════════════════════════════════════
   MEDIAPIPE
══════════════════════════════════════════════ */
async function loadMediaPipe() {
  if (mpReady || mpLoading) return;
  mpLoading = true;
  updateStatusBadge('loading');
  try {
    const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');
    const { HandLandmarker, FilesetResolver } = vision;
    const fs = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    mpHandLandmarker = await HandLandmarker.createFromOptions(fs, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numHands: 2,
      minHandDetectionConfidence: 0.5,
      minHandPresenceConfidence:  0.5,
      minTrackingConfidence:      0.5,
    });
    mpReady   = true;
    mpLoading = false;
    updateStatusBadge('ready');
    console.log('[MP] 준비 완료');
  } catch(e) {
    mpLoading = false;
    console.warn('[MP] 로드 실패:', e.message);
    updateStatusBadge('none');
  }
}

function updateStatusBadge(state) {
  const b = $('statusBadge');
  if (!b) return;
  b.className = 'cam-status-badge';
  if (state === 'ready')    { b.classList.add('ready');     b.textContent = 'AI 준비'; }
  else if (state === 'loading') { b.classList.add('detecting'); b.textContent = 'AI 로딩'; }
  else if (state === 'detecting') { b.classList.add('detecting'); b.textContent = '감지 중'; }
  else if (state === 'tap') { b.classList.add('tap');       b.textContent = '탭 모드'; }
  else                       { b.textContent = '자동 합성'; }
}

/* ══════════════════════════════════════════════
   LANDMARK → NAIL ZONES
══════════════════════════════════════════════ */
const NAIL_LM = {
  thumb:  { tip: 4,  dip: 3,  pip: 2,  mcp: 1  },
  index:  { tip: 8,  dip: 7,  pip: 6,  mcp: 5  },
  middle: { tip: 12, dip: 11, pip: 10, mcp: 9  },
  ring:   { tip: 16, dip: 15, pip: 14, mcp: 13 },
  pinky:  { tip: 20, dip: 19, pip: 18, mcp: 17 },
};

// 손 굽힘 감지
function isCurled(landmarks, isNorm, W, H) {
  const toY = v => isNorm ? v.y * H : v.y;
  let cnt = 0;
  [[8,6,5],[12,10,9],[16,14,13]].forEach(([tip,pip,mcp]) => {
    const tipY = toY(landmarks[tip]);
    const pipY = toY(landmarks[pip]);
    if (tipY > pipY - 5) cnt++;
  });
  return cnt >= 2;
}

function landmarksToZones(result, W, H) {
  if (!result?.landmarks?.length) return null;
  const zones = [];
  const curled = isCurled(result.landmarks[0], true, W, H);

  // 굽힘 상태별 파라미터
  const PARAMS = curled ? {
    thumb:  { wR: 1.10, hR: 1.60, dip: 0.42 },
    index:  { wR: 1.05, hR: 1.75, dip: 0.36 },
    middle: { wR: 1.02, hR: 1.75, dip: 0.34 },
    ring:   { wR: 0.98, hR: 1.68, dip: 0.34 },
    pinky:  { wR: 0.90, hR: 1.55, dip: 0.32 },
  } : {
    thumb:  { wR: 1.05, hR: 0.90, dip: 0.68 },
    index:  { wR: 1.00, hR: 1.02, dip: 0.65 },
    middle: { wR: 0.98, hR: 1.02, dip: 0.63 },
    ring:   { wR: 0.95, hR: 0.98, dip: 0.63 },
    pinky:  { wR: 0.88, hR: 0.88, dip: 0.60 },
  };

  result.landmarks.forEach((lms, hi) => {
    const hand = result.handedness?.[hi]?.[0]?.categoryName || 'Left';
    FINGER_ORDER.forEach(finger => {
      const pts = NAIL_LM[finger];
      const tip = lms[pts.tip], dip = lms[pts.dip], pip = lms[pts.pip];
      if (!tip || !dip || !pip) return;

      const tipX = tip.x*W, tipY = tip.y*H;
      const dipX = dip.x*W, dipY = dip.y*H;
      const pipX = pip.x*W, pipY = pip.y*H;

      const tipDip = Math.hypot(tipX-dipX, tipY-dipY);
      const dipPip = Math.hypot(dipX-pipX, dipY-pipY);
      if (tipDip < 2 || dipPip < 2) return;

      const p = PARAMS[finger];
      let cx, cy, h, w, angle;

      if (finger === 'thumb') {
        const mcp = lms[pts.mcp];
        const mcpX = mcp ? mcp.x*W : pipX;
        const mcpY = mcp ? mcp.y*H : pipY;
        const axisAngle = Math.atan2(tipY-mcpY, tipX-mcpX);
        angle = axisAngle + Math.PI/2;
        cx = tipX*(1-p.dip) + dipX*p.dip;
        cy = tipY*(1-p.dip) + dipY*p.dip;
        const thumbLen = Math.hypot(tipX-mcpX, tipY-mcpY);
        h = Math.max(tipDip*p.hR, thumbLen*0.28);
        w = h*p.wR;
      } else {
        cx = tipX*(1-p.dip) + dipX*p.dip;
        cy = tipY*(1-p.dip) + dipY*p.dip;
        h = tipDip*p.hR;
        w = h*p.wR;
        const raw = Math.atan2(tipY-dipY, tipX-dipX);
        if (curled) {
          angle = raw*0.3 + (-Math.PI/2)*0.7 + Math.PI/2;
        } else {
          angle = raw + Math.PI/2;
        }
      }

      // 크기 클램프
      const minD = Math.min(W,H)*0.07;
      if (h < minD) { const r=minD/h; h=minD; w*=r; }
      const maxWMap = {thumb:.16,index:.18,middle:.18,ring:.17,pinky:.14};
      const maxW = W*(maxWMap[finger]||.17);
      const maxH = H*.22;
      if (w > maxW) { const r=maxW/w; w=maxW; h*=r; }
      if (h > maxH) { const r=maxH/h; h=maxH; w*=r; }

      const margin = Math.max(w,h)*.6;
      if (cx<-margin||cx>W+margin||cy<-margin||cy>H+margin) return;

      zones.push({ finger, hand, cx, cy, w, h, angle, confidence: 0.9, curled });
    });
  });

  return zones.length >= 1 ? zones : null;
}

/* ══════════════════════════════════════════════
   TAP → ZONE 생성
   탭한 위치를 중심으로 손가락별 기본 크기의 존 생성
══════════════════════════════════════════════ */
function tapToZone(finger, tapX, tapY, videoW, videoH) {
  const sr = FINGER_SIZE_RATIO[finger];
  const w  = videoW  * sr.w * 2;
  const h  = videoH  * sr.h * 2;
  return {
    finger, hand: 'Left',
    cx: tapX, cy: tapY,
    w, h, angle: 0,
    confidence: 1.0,
    fromTap: true,
  };
}

/* ══════════════════════════════════════════════
   신뢰도 계산 (5개 중 몇 개 감지, 크기 적정성)
══════════════════════════════════════════════ */
function calcConfidence(zones, W, H) {
  if (!zones) return 0;
  const fingerCount = new Set(zones.map(z=>z.finger)).size;
  const countScore  = fingerCount / 5; // 5개 중 몇 개
  // 크기 적정성: 각 존 너비가 이미지의 4~20% 사이면 OK
  let sizeScore = 0;
  zones.forEach(z => {
    const wPct = z.w / W;
    if (wPct >= 0.04 && wPct <= 0.20) sizeScore++;
  });
  sizeScore /= zones.length;
  return (countScore * 0.7 + sizeScore * 0.3);
}

/* ══════════════════════════════════════════════
   NAIL SHAPES
══════════════════════════════════════════════ */
const SHAPES = {
  round: (hw,hh,ctx) => {
    ctx.beginPath();
    ctx.moveTo(-hw*.70, hh*.20);
    ctx.bezierCurveTo(-hw*.70,-hh*.45,-hw*.45,-hh,0,-hh);
    ctx.bezierCurveTo(hw*.45,-hh,hw*.70,-hh*.45,hw*.70,hh*.20);
    ctx.lineTo(hw*.70,hh*.85);
    ctx.quadraticCurveTo(0,hh*1.04,-hw*.70,hh*.85);
    ctx.closePath();
  },
  square: (hw,hh,ctx) => {
    const r=hw*.10; ctx.beginPath();
    ctx.moveTo(-hw*.74+r,hh*.88); ctx.lineTo(-hw*.74,hh*.88-r);
    ctx.lineTo(-hw*.74,-hh*.86+r);
    ctx.quadraticCurveTo(-hw*.74,-hh*.86,-hw*.74+r,-hh*.86);
    ctx.lineTo(hw*.74-r,-hh*.86);
    ctx.quadraticCurveTo(hw*.74,-hh*.86,hw*.74,-hh*.86+r);
    ctx.lineTo(hw*.74,hh*.88-r); ctx.lineTo(hw*.74,hh*.88);
    ctx.lineTo(-hw*.74+r,hh*.88); ctx.closePath();
  },
  almond: (hw,hh,ctx) => {
    ctx.beginPath();
    ctx.moveTo(-hw*.68,hh*.24);
    ctx.bezierCurveTo(-hw*.68,-hh*.22,-hw*.28,-hh*1.05,0,-hh*1.12);
    ctx.bezierCurveTo(hw*.28,-hh*1.05,hw*.68,-hh*.22,hw*.68,hh*.24);
    ctx.lineTo(hw*.68,hh*.86);
    ctx.quadraticCurveTo(0,hh*1.04,-hw*.68,hh*.86); ctx.closePath();
  },
  coffin: (hw,hh,ctx) => {
    ctx.beginPath();
    ctx.moveTo(-hw*.72,hh*.88); ctx.lineTo(-hw*.72,-hh*.28);
    ctx.bezierCurveTo(-hw*.72,-hh*.82,-hw*.36,-hh*.96,-hw*.20,-hh*.96);
    ctx.lineTo(hw*.20,-hh*.96);
    ctx.bezierCurveTo(hw*.36,-hh*.96,hw*.72,-hh*.82,hw*.72,-hh*.28);
    ctx.lineTo(hw*.72,hh*.88); ctx.lineTo(-hw*.72,hh*.88); ctx.closePath();
  },
  stiletto: (hw,hh,ctx) => {
    ctx.beginPath();
    ctx.moveTo(-hw*.72,hh*.86);
    ctx.bezierCurveTo(-hw*.72,hh*.08,-hw*.32,-hh*.92,0,-hh*1.30);
    ctx.bezierCurveTo(hw*.32,-hh*.92,hw*.72,hh*.08,hw*.72,hh*.86);
    ctx.quadraticCurveTo(0,hh*1.04,-hw*.72,hh*.86); ctx.closePath();
  },
};

/* ══════════════════════════════════════════════
   DRAW NAIL OVERLAY
══════════════════════════════════════════════ */
function drawNailOverlay(ctx, zone, designImg, cfg) {
  if (!designImg || !zone) return;
  const { cx, cy, w, h, angle } = zone;
  const nw = w * cfg.scale;
  const nh = h * cfg.scale;
  if (nw < 4 || nh < 4) return;

  const adjCy = cy - nh * cfg.offsetY * 0.08;

  ctx.save();
  ctx.translate(cx, adjCy);
  ctx.rotate(angle);

  const hw = nw/2, hh = nh/2;
  (SHAPES[currentShape] || SHAPES.round)(hw, hh, ctx);
  ctx.clip();

  // 디자인 이미지
  const iw = designImg.naturalWidth || designImg.width;
  const ih = designImg.naturalHeight || designImg.height;
  let dw, dh;
  if (iw/ih > nw/nh) { dh=nh; dw=dh*(iw/ih); }
  else               { dw=nw; dh=dw*(ih/iw); }

  ctx.globalAlpha = cfg.opacity;
  ctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(designImg, -dw/2, -dh/2, dw, dh);

  // Multiply 블렌딩
  ctx.globalCompositeOperation = 'multiply';
  ctx.globalAlpha = 0.10;
  ctx.drawImage(designImg, -dw/2, -dh/2, dw, dh);

  // 큐티클 그림자
  ctx.globalCompositeOperation = 'multiply';
  ctx.globalAlpha = 0.30;
  const sg = ctx.createLinearGradient(0, hh*.40, 0, nh);
  sg.addColorStop(0, 'rgba(22,14,8,0)');
  sg.addColorStop(1, 'rgba(22,14,8,0.88)');
  ctx.fillStyle = sg; ctx.fillRect(-nw,-nh,nw*2,nh*2);

  // 광택
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.28;
  const g1 = ctx.createRadialGradient(-hw*.20,-hh*.30,0,-hw*.06,-hh*.12,nw*.56);
  g1.addColorStop(0,'rgba(255,255,255,0.94)');
  g1.addColorStop(.28,'rgba(255,255,255,0.30)');
  g1.addColorStop(.60,'rgba(255,255,255,0.06)');
  g1.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g1; ctx.fillRect(-nw,-nh,nw*2,nh*2);

  // 림 그림자
  ctx.globalCompositeOperation = 'multiply';
  ctx.globalAlpha = 0.16;
  const rL = ctx.createLinearGradient(-nw*.72,0,-nw*.20,0);
  rL.addColorStop(0,'rgba(15,10,5,0.70)'); rL.addColorStop(1,'rgba(15,10,5,0)');
  ctx.fillStyle = rL; ctx.fillRect(-nw,-nh,nw*2,nh*2);
  const rR = ctx.createLinearGradient(nw*.72,0,nw*.20,0);
  rR.addColorStop(0,'rgba(15,10,5,0.70)'); rR.addColorStop(1,'rgba(15,10,5,0)');
  ctx.fillStyle = rR; ctx.fillRect(-nw,-nh,nw*2,nh*2);

  ctx.restore();
}

/* ══════════════════════════════════════════════
   AR LOOP — 실시간 렌더
══════════════════════════════════════════════ */
let lastVideoTime = -1;

function startARLoop() {
  stopARLoop();
  function loop() {
    arLoopId = requestAnimationFrame(loop);
    const video = $('videoEl');
    if (!video.videoWidth || video.readyState < 2) return;
    if (video.currentTime === lastVideoTime) return;
    lastVideoTime = video.currentTime;

    const arCanvas = $('arCanvas');
    const W = video.videoWidth, H = video.videoHeight;
    if (arCanvas.width !== W || arCanvas.height !== H) {
      arCanvas.width = W; arCanvas.height = H;
    }

    const ctx = arCanvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    // AI 자동 감지 모드
    if (detectionMode === 'auto' && mpReady && mpHandLandmarker) {
      try {
        const result = mpHandLandmarker.detectForVideo(video, performance.now());
        const zones  = landmarksToZones(result, W, H);
        const conf   = calcConfidence(zones, W, H);

        if (conf > bestConfidence) {
          bestConfidence = conf;
          bestZones      = zones;
        }

        autoDetectFrames++;

        // 신뢰도 80% 이상 + 5개 모두 감지 → 자동 촬영
        if (conf >= 0.80 && zones && new Set(zones.map(z=>z.finger)).size >= 5) {
          console.log('[AR] 자동 감지 성공, 신뢰도:', conf.toFixed(2));
          autoSnap(zones);
          return;
        }

        // 3초(약 90프레임) 지나도 실패 → 탭 모드로
        if (autoDetectFrames > 90 && detectionMode === 'auto') {
          startTapMode();
          return;
        }

        // 실시간 오버레이 (미리보기용)
        if (zones && arDesignImgs.length) {
          renderARFrame(ctx, zones, arDesignImgs, W, H);
        }
      } catch(e) { /* silent */ }
    }

    // 가이드 오버레이 그리기
    drawHandGuide();
  }
  loop();
}

function stopARLoop() {
  if (arLoopId) { cancelAnimationFrame(arLoopId); arLoopId = null; }
}

/* ══════════════════════════════════════════════
   손 가이드 오버레이 (접은 손 실루엣)
══════════════════════════════════════════════ */
let guidePulse = 0;
function drawHandGuide() {
  const gc     = $('guideCanvas');
  const video  = $('videoEl');
  const W = video.videoWidth || gc.offsetWidth;
  const H = video.videoHeight || gc.offsetHeight;

  if (gc.width !== Math.round(gc.offsetWidth) || gc.height !== Math.round(gc.offsetHeight)) {
    gc.width  = Math.round(gc.offsetWidth);
    gc.height = Math.round(gc.offsetHeight);
  }

  const cW = gc.width, cH = gc.height;
  const ctx = gc.getContext('2d');
  ctx.clearRect(0, 0, cW, cH);

  if (detectionMode === 'done') return;

  guidePulse += 0.03;
  const breath = 0.5 + Math.sin(guidePulse) * 0.08;

  // 접은 손 포지션 가이드 — 4개 손가락이 위에 나란히, 엄지 아래
  const fingers = [
    { x: .24, y: .42, rx: .065, ry: .080, rot: -5  }, // 검지
    { x: .42, y: .35, rx: .068, ry: .085, rot:  0  }, // 중지
    { x: .58, y: .37, rx: .065, ry: .080, rot:  5  }, // 약지
    { x: .73, y: .44, rx: .055, ry: .068, rot: 10  }, // 새끼
    { x: .22, y: .72, rx: .065, ry: .075, rot: 15  }, // 엄지
  ];

  fingers.forEach(f => {
    const cx = cW * f.x, cy = cH * f.y;
    const rx = cW * f.rx, ry = cH * f.ry;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(f.rot * Math.PI / 180);

    // 타원 점선
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(200,165,106,${breath * 0.75})`;
    ctx.lineWidth   = 1.8;
    ctx.setLineDash([6, 5]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 속 채우기
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,165,106,${breath * 0.08})`;
    ctx.fill();

    ctx.restore();
  });

  // 하단 안내 문구
  ctx.save();
  ctx.font = `${Math.max(12, Math.round(cW * 0.034))}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = 6;
  ctx.fillStyle = `rgba(255,255,255,${0.55 + Math.sin(guidePulse*.6)*.08})`;
  ctx.fillText(
    detectionMode === 'tap' ? '손톱 위치를 탭해주세요' : '타원 안에 손톱을 맞춰 주세요',
    cW/2, cH - 12
  );
  ctx.restore();
}

/* ══════════════════════════════════════════════
   자동 촬영 (AI 감지 성공)
══════════════════════════════════════════════ */
async function autoSnap(zones) {
  if (detectionMode !== 'auto') return;
  detectionMode = 'done';
  stopARLoop();

  // 짧은 카운트다운
  const cd = $('autoCountdown');
  cd.classList.add('show');
  for (let i = 1; i >= 1; i--) {
    cd.textContent = '✓';
    await sleep(400);
  }
  cd.classList.remove('show');

  flashEffect();
  await doCapture(zones);
}

/* ══════════════════════════════════════════════
   수동 촬영 (촬영 버튼)
══════════════════════════════════════════════ */
async function manualSnap() {
  if (detectionMode === 'tap') {
    toast('손톱을 탭해주세요 (탭 모드 진행 중)');
    return;
  }

  const video = $('videoEl');
  if (!camStream || !video.videoWidth) { toast('카메라가 준비되지 않았습니다.'); return; }

  // 마지막으로 감지된 best zones 사용, 없으면 탭 모드
  if (bestZones && bestConfidence >= 0.50) {
    detectionMode = 'done';
    stopARLoop();
    flashEffect();
    await doCapture(bestZones);
  } else {
    startTapMode();
    toast('손톱 위치를 직접 탭해주세요', 2500);
  }
}

/* ══════════════════════════════════════════════
   탭 모드 시작
══════════════════════════════════════════════ */
function startTapMode() {
  if (detectionMode === 'tap') return;
  detectionMode = 'tap';
  tapZones = [];
  tapStep  = 0;

  updateStatusBadge('tap');
  $('tapLayer').classList.add('active');
  $('tapGuide').classList.remove('hidden');
  $('btnTapDone').classList.remove('show');
  $('btnTapReset').classList.remove('show');
  $('detectProgress').classList.remove('show');

  // 탭 순서: 검지 → 중지 → 약지 → 새끼 → 엄지
  const TAP_ORDER = ['index','middle','ring','pinky','thumb'];

  // 진행 dots
  const row = $('tapProgressRow');
  row.innerHTML = TAP_ORDER.map((f,i) =>
    `<div class="tap-dot${i===0?' current':''}" id="tapDot${i}">${i+1}</div>`
  ).join('');

  updateTapInstruction(TAP_ORDER[0]);

  // 탭 이벤트
  $('tapLayer').onclick = (e) => {
    if (tapStep >= 5) return;
    const rect = $('tapLayer').getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const scaleX = ($('videoEl').videoWidth  || rect.width)  / rect.width;
    const scaleY = ($('videoEl').videoHeight || rect.height) / rect.height;
    const vx = x * scaleX, vy = y * scaleY;
    const vW = $('videoEl').videoWidth  || 1280;
    const vH = $('videoEl').videoHeight || 960;

    const finger = TAP_ORDER[tapStep];
    const zone   = tapToZone(finger, vx, vy, vW, vH);
    tapZones.push(zone);

    // 마커 표시
    addTapMarker(x, y, tapStep + 1);

    // dots 업데이트
    $(`tapDot${tapStep}`).className = 'tap-dot done';
    tapStep++;

    if (tapStep < 5) {
      $(`tapDot${tapStep}`).className = 'tap-dot current';
      updateTapInstruction(TAP_ORDER[tapStep]);
    } else {
      // 5개 완료
      $('tapInstruction').textContent = '완료! "적용하기"를 눌러주세요';
      $('btnTapDone').classList.add('show');
      $('btnTapReset').classList.add('show');
    }
  };
}

function updateTapInstruction(finger) {
  const names = { thumb:'엄지', index:'검지', middle:'중지', ring:'약지', pinky:'새끼' };
  $('tapInstruction').textContent = `${names[finger]} 손톱 중앙을 탭해주세요`;
}

function addTapMarker(x, y, num) {
  const wrap = $('tapMarkers');
  const el   = document.createElement('div');
  el.className = 'tap-marker';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.textContent = num;
  el.style.fontSize = '.65rem';
  el.style.color    = 'var(--gold)';
  el.style.fontWeight = '600';
  el.style.display  = 'flex';
  el.style.alignItems = 'center';
  el.style.justifyContent = 'center';
  wrap.appendChild(el);
}

function clearTapMarkers() {
  $('tapMarkers').innerHTML = '';
}

/* ══════════════════════════════════════════════
   탭 완료 → 촬영
══════════════════════════════════════════════ */
async function onTapDone() {
  if (tapZones.length < 3) { toast('최소 3개 이상 탭해주세요.'); return; }

  detectionMode = 'done';
  $('tapLayer').classList.remove('active');
  $('tapGuide').classList.add('hidden');
  $('btnTapDone').classList.remove('show');
  $('btnTapReset').classList.remove('show');
  clearTapMarkers();

  flashEffect();
  await doCapture(tapZones);
}

/* ══════════════════════════════════════════════
   실제 캡처 처리
══════════════════════════════════════════════ */
async function doCapture(zones) {
  stopARLoop();

  const video = $('videoEl');
  const MAX_W = 1920;
  const rawW  = video.videoWidth  || 1280;
  const rawH  = video.videoHeight || 960;
  const ratio = Math.min(MAX_W / rawW, 1);
  const snapW = Math.round(rawW * ratio);
  const snapH = Math.round(rawH * ratio);

  const sc  = $('snapCanvas');
  sc.width  = snapW; sc.height = snapH;
  const sctx = sc.getContext('2d');

  if (facingMode === 'user') {
    sctx.save(); sctx.translate(snapW, 0); sctx.scale(-1, 1);
    sctx.drawImage(video, 0, 0, snapW, snapH);
    sctx.restore();
    if (zones) zones = zones.map(z => ({...z, cx: rawW - z.cx}));
  } else {
    sctx.drawImage(video, 0, 0, snapW, snapH);
  }

  // zones 스케일 변환
  const sx = snapW / rawW, sy = snapH / rawH;
  if (zones) zones = zones.map(z => ({
    ...z, cx: z.cx*sx, cy: z.cy*sy, w: z.w*sx, h: z.h*sy
  }));

  const snapURL = sc.toDataURL('image/jpeg', 0.94);

  if (appMode === 'uniform') {
    cachedSnap   = snapURL;
    cachedZonesL = zones;
  } else if (capturePhase === 'left') {
    cachedSnapL  = snapURL;
    cachedZonesL = zones;
    // 오른손 촬영으로
    capturePhase = 'right';
    stopCamera();
    resetDetection();
    updateCameraHint();
    updatePhaseIndicator();
    await startCamera();
    toast('왼손 촬영 완료! 이제 오른손을 촬영해주세요', 2500);
    return;
  } else {
    cachedSnapR  = snapURL;
    cachedZonesR = zones;
  }

  stopCamera();
  captureComplete = true;
  await showResult();
}

function resetDetection() {
  detectionMode    = 'auto';
  autoDetectFrames = 0;
  bestZones        = null;
  bestConfidence   = 0;
  tapZones         = [];
  tapStep          = 0;
  $('tapLayer').classList.remove('active');
  $('tapGuide').classList.add('hidden');
  $('btnTapDone').classList.remove('show');
  $('btnTapReset').classList.remove('show');
  clearTapMarkers();

}

/* ══════════════════════════════════════════════
   결과 렌더링
══════════════════════════════════════════════ */
function renderARFrame(ctx, zones, designImgs, W, H) {
  if (!zones || !designImgs.length) return;
  const ORDER = ['pinky','ring','middle','index','thumb'];
  ORDER.forEach(finger => {
    const fi  = FINGER_ORDER.indexOf(finger);
    const img = designImgs[fi];
    if (!img) return;
    const zone = zones.find(z => z.finger === finger);
    if (!zone) return;
    drawNailOverlay(ctx, zone, img, overlayCfg);
  });
}

async function renderToCanvas(canvas, snapURL, zones, imgs) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const W = img.naturalWidth, H = img.naturalHeight;
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, W, H);
      if (zones && imgs.length) renderARFrame(ctx, zones, imgs, W, H);
      res();
    };
    img.onerror = res;
    img.src = snapURL;
  });
}

async function showResult() {
  showScreen('screenResult');
  if (appMode === 'uniform') {
    $('previewCanvas').classList.remove('hidden');
    $('dualWrap').classList.add('hidden');
    $('previewTabs').classList.add('hidden');
    await renderToCanvas($('previewCanvas'), cachedSnap, cachedZonesL, arDesignImgs);
  } else {
    $('previewCanvas').classList.add('hidden');
    $('dualWrap').classList.remove('hidden');
    $('previewTabs').classList.remove('hidden');
    await Promise.all([
      renderToCanvas($('previewCanvasL'), cachedSnapL, cachedZonesL, arDesignImgs),
      renderToCanvas($('previewCanvasR'), cachedSnapR, cachedZonesR, arDesignImgsR),
    ]);
  }
  updateDesignInfoBar();
}

function redrawResult() {
  if (appMode === 'uniform') renderToCanvas($('previewCanvas'), cachedSnap, cachedZonesL, arDesignImgs);
  else {
    renderToCanvas($('previewCanvasL'), cachedSnapL, cachedZonesL, arDesignImgs);
    renderToCanvas($('previewCanvasR'), cachedSnapR, cachedZonesR, arDesignImgsR);
  }
}

/* ══════════════════════════════════════════════
   CAMERA
══════════════════════════════════════════════ */
async function startCamera() {
  if (camStream) return;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
  const constraints = [
    { video:{ facingMode:{ideal:facingMode}, width:{ideal:isIOS?1280:1920}, height:{ideal:isIOS?960:1440} }, audio:false },
    { video:{ facingMode:{ideal:facingMode} }, audio:false },
    { video:true, audio:false },
  ];
  for (const c of constraints) {
    try { camStream = await navigator.mediaDevices.getUserMedia(c); break; }
    catch(e) { console.warn('[CAM]', e.message); }
  }
  if (!camStream) { toast('카메라 권한이 필요합니다.'); return; }

  const v = $('videoEl');
  v.srcObject = camStream;
  v.setAttribute('playsinline',''); v.muted = true;
  await v.play().catch(()=>{});

  resetDetection();
  updateStatusBadge(mpReady ? 'detecting' : 'loading');
  startARLoop();
  loadMediaPipe().catch(()=>{});
}

function stopCamera() {
  stopARLoop();
  if (camStream) {
    camStream.getTracks().forEach(t=>t.stop());
    camStream = null;
    $('videoEl').srcObject = null;
  }
}

function loadImg(src) {
  if (!src) return Promise.resolve(null);
  return new Promise(res => {
    const img = new Image();
    img.onload  = () => res(img);
    img.onerror = () => res(null);
    img.src = src;
  });
}
function loadImgArray(srcs) { return Promise.all(srcs.map(loadImg)); }

async function applyUniformDesign(design) {
  uniformDesign = design;
  const src = design.image_data || design.thumb_data;
  const img = await loadImg(src);
  arDesignImgs = [img, img, img, img, img];
}

const SLOT_TO_FINGER_L = [4,3,2,1,0];
const SLOT_TO_FINGER_R = [0,1,2,3,4];

async function applyIndividualDesigns() {
  const leftD  = FINGER_ORDER.map((_,fi) => { const si=SLOT_TO_FINGER_L.indexOf(fi); return si>=0?individualSlots[si]:null; });
  const rightD = FINGER_ORDER.map((_,fi) => { const si=SLOT_TO_FINGER_R.indexOf(fi); return si>=0?individualSlots[5+si]:null; });
  const getSrc = d => d?.image_data || d?.thumb_data || null;
  [arDesignImgs, arDesignImgsR] = await Promise.all([
    loadImgArray(leftD.map(getSrc)),
    loadImgArray(rightD.map(getSrc)),
  ]);
}

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
let adminPinHash = null;
async function setupAdmin() {

  adminPinHash = stored || await sha256('syoni2024');
  if (!stored) localStorage.setItem('shoni_admin_hash', adminPinHash);
}
async function checkPin(input) { return await sha256(input) === adminPinHash; }

function makeThumb(dataURL, maxSize) {
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const r=Math.min(maxSize/img.width,maxSize/img.height,1);
      const cv=document.createElement('canvas');
      cv.width=Math.round(img.width*r); cv.height=Math.round(img.height*r);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      res(cv.toDataURL('image/jpeg',0.85));
    };
    img.onerror=()=>res(dataURL);
    img.src=dataURL;
  });
}

function toast(msg, dur=2200) {
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  $('toastWrap').appendChild(el);
  setTimeout(()=>el.remove(), dur);
}
function flashEffect() {
  const f=document.createElement('div');
  Object.assign(f.style,{position:'fixed',inset:'0',background:'#fff',opacity:'0.85',
    zIndex:'9990',pointerEvents:'none',transition:'opacity .18s'});
  document.body.appendChild(f);
  requestAnimationFrame(()=>{ f.style.opacity='0'; setTimeout(()=>f.remove(),200); });
}
function fileToDataURL(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
}
function sleep(ms) { return new Promise(res=>setTimeout(res,ms)); }

    toast('이미지 업로드됨 — 손톱 위치를 탭해주세요', 2500);
  });

  /* ── 디자인 모달 ── */
  $('designModal').addEventListener('click',e=>{ if(e.target===$('designModal')) closeDesignModal(); });
  $('modalCancelBtn').addEventListener('click', closeDesignModal);
  $('modalApplyBtn').addEventListener('click', applyFromModal);

  /* ── 결과 화면 ── */
  $('resultBack').addEventListener('click',()=>{
    captureComplete=false;
    cachedSnap=cachedSnapL=cachedSnapR=null;
    cachedZonesL=cachedZonesR=null;
    showScreen('screenDesign');
  });

  $('btnRedo').addEventListener('click', async()=>{
    captureComplete=false;
    capturePhase=appMode==='uniform'?'uniform':'left';
    showScreen('screenCamera');
    updateCameraHint(); updatePhaseIndicator();
    await startCamera();
  });

  $('btnChangeDesign').addEventListener('click',()=>showScreen('screenDesign'));
  $('btnSave').addEventListener('click', saveResult);
  $('btnShare').addEventListener('click', shareResult);

  /* ── 슬라이더 ── */
  $('slScale').addEventListener('input',()=>{
    overlayCfg.scale=+$('slScale').value/100;
    $('valScale').textContent=$('slScale').value+'%'; redrawResult();
  });
  $('slOffsetY').addEventListener('input',()=>{
    overlayCfg.offsetY=+$('slOffsetY').value;
    $('valOffsetY').textContent=$('slOffsetY').value; redrawResult();
  });
  $('slOpacity').addEventListener('input',()=>{
    overlayCfg.opacity=+$('slOpacity').value/100;
    $('valOpacity').textContent=$('slOpacity').value+'%'; redrawResult();
  });

  /* ── 셰이프 ── */
  $$('.shape-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      $$('.shape-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentShape=btn.dataset.shape;
      redrawResult();
    });
  });

  /* ── 탭 (미리보기) ── */
  $$('.ptab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      $$('.ptab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const v=btn.dataset.view;
      if(v==='both'){ $('dualWrap').style.display='flex'; $('previewCanvasL').style.display='block'; $('previewCanvasR').style.display='block'; }
      else if(v==='left'){ $('dualWrap').style.display='block'; $('previewCanvasL').style.display='block'; $('previewCanvasR').style.display='none'; }
      else{ $('dualWrap').style.display='block'; $('previewCanvasL').style.display='none'; $('previewCanvasR').style.display='block'; }
    });
  });

  /* ── 관리자 ── */
  $('adminTrigger').addEventListener('click',()=>{
    $('pinInput').value=''; $('pinErr').textContent='';
    $('pinModal').classList.add('show');
    setTimeout(()=>$('pinInput').focus(),100);
  });
  $('pinCancel').addEventListener('click',()=>$('pinModal').classList.remove('show'));
  $('pinSubmit').addEventListener('click', async()=>{
    if(await checkPin($('pinInput').value)){
      $('pinModal').classList.remove('show');
      renderAdminList();
      showScreen('screenAdmin');
    } else {
      $('pinErr').textContent='잘못된 PIN입니다.';
      $('pinInput').value=''; $('pinInput').focus();
    }
  });
  $('pinInput').addEventListener('keydown',e=>{ if(e.key==='Enter') $('pinSubmit').click(); });
  $('adminBack').addEventListener('click',()=>showScreen('screenMode'));
  $('adminUploadArea').addEventListener('click',()=>$('adminFileInput').click());
  $('adminFileInput').addEventListener('change', async e=>{
    const f=e.target.files[0]; if(!f) return; e.target.value='';
    adminImgDataURL=await fileToDataURL(f);
    const img=$('adminPreviewImg');
    img.src=adminImgDataURL; img.style.display='block';
    $('adminUploadArea').querySelector('.admin-upload-placeholder').style.display='none';
  });
  $('adminSaveBtn').addEventListener('click', adminSave);

  console.log('[SHONI] v11 init complete');
}

init();
</script>
</body>
</html>
